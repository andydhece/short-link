services:
  db:
    image: mariadb:10.11
    container_name: url-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword998}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./dc:/var/lib/mysql
    networks:
      - url-net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url-web
    restart: always
    ports:
      - "8080:80"
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT:-3306}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      BASE_URL: ${BASE_URL}
    depends_on:
      - db
    networks:
      - url-net

networks:
  url-net:
    driver: bridge
