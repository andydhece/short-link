<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - ShortLink Grand Luxury</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Cinzel:wght@500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        serif: ['Cinzel', 'serif'],
                    },
                },
            },
        }
    </script>
    <style>
        .gold-gradient-text {
            background: linear-gradient(135deg, #fce0ad 0%, #dfac6c 50%, #c68b45 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gold-border {
            border: 1px solid rgba(223, 172, 108, 0.15);
        }
        .gold-border:hover {
            border: 1px solid rgba(223, 172, 108, 0.35);
        }
        .luxury-card {
            background: linear-gradient(145deg, rgba(20, 24, 38, 0.8) 0%, rgba(10, 12, 20, 0.95) 100%);
            backdrop-filter: blur(25px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        .glowing-mesh {
            filter: blur(140px);
            opacity: 0.45;
        }
    </style>
</head>
<body class="bg-[#05060b] text-slate-200 min-h-screen flex items-center justify-center p-4 relative overflow-hidden font-sans select-none">
    <!-- Luxury Glowing Mesh Background -->
    <div class="absolute top-[-25%] left-[-20%] w-[65%] h-[65%] rounded-full bg-gradient-to-br from-[#dfac6c]/20 to-transparent glowing-mesh pointer-events-none"></div>
    <div class="absolute bottom-[-25%] right-[-20%] w-[65%] h-[65%] rounded-full bg-gradient-to-br from-[#c68b45]/15 to-transparent glowing-mesh pointer-events-none"></div>

    <div class="luxury-card w-full max-w-md rounded-[32px] p-8 md:p-11 transition-all duration-500 relative z-10 gold-border">
        <!-- Logo & Header -->
        <div class="text-center mb-9">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-br from-[#dfac6c] via-[#b68246] to-[#8a5d29] text-slate-950 mb-6 shadow-xl shadow-amber-500/10">
                <svg class="w-10 h-10 text-slate-950" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
                </svg>
            </div>
            <h1 class="text-4xl font-bold font-serif tracking-widest gold-gradient-text uppercase">
                ShortLink
            </h1>
            <div class="h-[1px] w-24 bg-gradient-to-r from-transparent via-[#dfac6c]/40 to-transparent mx-auto mt-4"></div>
            <p class="text-xs text-slate-400 mt-4 tracking-widest uppercase font-medium">Portal Kredensial Premium</p>
        </div>

        <!-- Error Container -->
        <div id="error-box" class="hidden mb-6 p-4 rounded-2xl bg-red-950/20 border border-red-800/30 text-xs font-semibold text-red-400 text-left flex items-start gap-3">
            <svg class="w-5 h-5 flex-shrink-0 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
            <span id="error-msg" class="leading-relaxed"></span>
        </div>

        <!-- Form Login -->
        <form id="login-form" class="space-y-6">
            <div>
                <label for="username" class="block text-[10px] font-bold text-[#dfac6c] uppercase tracking-widest mb-3">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4.5 flex items-center text-slate-500 pointer-events-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </span>
                    <input type="text" id="username" required 
                        class="w-full pl-11 pr-4 py-4 bg-[#0a0c14] border border-slate-900 focus:border-[#dfac6c]/50 focus:ring-4 focus:ring-[#dfac6c]/5 text-white placeholder-slate-600 rounded-2xl outline-none transition-all duration-300 text-xs tracking-wider"
                        placeholder="Masukkan username Anda">
                </div>
            </div>
            <div>
                <label for="password" class="block text-[10px] font-bold text-[#dfac6c] uppercase tracking-widest mb-3">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4.5 flex items-center text-slate-500 pointer-events-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                    </span>
                    <input type="password" id="password" required 
                        class="w-full pl-11 pr-4 py-4 bg-[#0a0c14] border border-slate-900 focus:border-[#dfac6c]/50 focus:ring-4 focus:ring-[#dfac6c]/5 text-white placeholder-slate-600 rounded-2xl outline-none transition-all duration-300 text-xs tracking-wider"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" 
                class="w-full py-4 bg-gradient-to-r from-[#dfac6c] via-[#b68246] to-[#8a5d29] hover:brightness-110 active:brightness-95 text-slate-950 font-bold rounded-2xl shadow-xl shadow-amber-500/5 transition-all duration-300 hover:scale-[1.01] active:scale-[0.99] outline-none text-xs tracking-widest uppercase">
                Masuk ke Dashboard
            </button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');
            const errorMsg = document.getElementById('error-msg');

            errorBox.classList.add('hidden');

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    window.location.href = '/dashboard';
                } else {
                    errorMsg.innerText = data.error || 'Terjadi kesalahan saat masuk.';
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.innerText = 'Tidak dapat menghubungi server. Coba lagi.';
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
