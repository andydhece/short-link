<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Pemendek URL Kustom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen flex items-center justify-center p-4">
    <div class="glass w-full max-w-md rounded-2xl shadow-2xl p-8 transition-all duration-300">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 text-white font-extrabold text-2xl mb-4 shadow-lg shadow-blue-500/30">
                L
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Daftar Akun</h1>
            <p class="text-sm text-slate-500 mt-1">Buat akun untuk mulai memendekkan tautan</p>
        </div>

        <div id="error-box" class="hidden mb-4 p-4 rounded-xl bg-red-50 border border-red-200 text-sm font-medium text-red-800 text-left">
        </div>
        <div id="success-box" class="hidden mb-4 p-4 rounded-xl bg-green-50 border border-green-200 text-sm font-medium text-green-800 text-left">
        </div>

        <form id="register-form" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                <input type="text" id="username" required minlength="3"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 text-slate-800 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all"
                    placeholder="Minimal 3 karakter alfanumerik">
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <input type="password" id="password" required minlength="6"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 text-slate-800 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all"
                    placeholder="Minimal 6 karakter">
            </div>

            <button type="submit" 
                class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold rounded-xl shadow-lg shadow-blue-500/20 hover:shadow-blue-500/30 transition-all outline-none">
                Daftar Akun Baru
            </button>

            <div class="text-center mt-6 text-sm text-slate-500">
                Sudah punya akun? <a href="/" class="text-blue-600 hover:underline font-medium">Masuk di sini</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');
            const successBox = document.getElementById('success-box');

            errorBox.classList.add('hidden');
            successBox.classList.add('hidden');

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    successBox.innerText = 'Pendaftaran berhasil! Mengalihkan ke dashboard...';
                    successBox.classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    errorBox.innerText = data.error || 'Terjadi kesalahan saat mendaftar.';
                    errorBox.classList.remove('hidden');
                }
            } catch (err) {
                errorBox.innerText = 'Tidak dapat menghubungi server. Coba lagi.';
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
