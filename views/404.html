<!DOCTYPE html>
<html lang="id">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cinzel:wght@500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        serif: ['Cinzel', 'serif'],
                    },
                },
            },
        }
    </script>
    <style>
        .gold-gradient-text {
            background: linear-gradient(135deg, #fce0ad 0%, #dfac6c 50%, #c68b45 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gold-border {
            border: 1px solid rgba(223, 172, 108, 0.15);
        }
        .luxury-card {
            background: linear-gradient(145deg, rgba(20, 24, 38, 0.8) 0%, rgba(10, 12, 20, 0.95) 100%);
            backdrop-filter: blur(25px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        .glowing-mesh {
            filter: blur(140px);
            opacity: 0.45;
        }
    </style>
</head>
<body class="bg-[#05060b] text-slate-200 min-h-screen flex items-center justify-center p-4 relative overflow-hidden font-sans select-none">
    <!-- Luxury Glowing Mesh Background -->
    <div class="absolute top-[-25%] left-[-20%] w-[65%] h-[65%] rounded-full bg-gradient-to-br from-[#dfac6c]/20 to-transparent glowing-mesh pointer-events-none"></div>
    <div class="absolute bottom-[-25%] right-[-20%] w-[65%] h-[65%] rounded-full bg-gradient-to-br from-[#c68b45]/15 to-transparent glowing-mesh pointer-events-none"></div>

    <div class="luxury-card w-full max-w-md rounded-[32px] p-8 md:p-11 text-center transition-all duration-500 relative z-10 gold-border">

            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>

        <h1 class="text-4xl font-extrabold font-serif tracking-widest gold-gradient-text uppercase">
            404
        </h1>
        <h2 class="text-lg font-bold text-slate-200 mt-2 tracking-wide">Tautan Tidak Aktif</h2>
        <p class="text-sm text-slate-400 mt-4 mb-8 leading-relaxed font-medium">
            Maaf, tautan pendek yang Anda tuju salah, telah kedaluwarsa, atau tidak terdaftar di sistem kami.
        </p>

        <a href="/" 
            class="inline-block w-full py-4.5 bg-gradient-to-r from-[#dfac6c] via-[#b68246] to-[#8a5d29] hover:brightness-110 active:brightness-95 text-slate-950 font-bold rounded-2xl shadow-xl shadow-amber-500/5 transition-all duration-300 hover:scale-[1.01] active:scale-[0.99] outline-none text-xs tracking-widest uppercase">
            Kembali ke Beranda
        </a>
    </div>

</html>
